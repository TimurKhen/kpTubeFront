<div class="container">
    <div class="profile">
        <div class="header">
            <img [src]="userInformation()?.header | pathConverter">
        </div>
        <div class="information">
            <div class="avatar">
                <img [src]="userInformation()?.avatar | pathConverter">
            </div>
            <div class="text">
                <h3>{{ userInformation()?.username }}</h3>
                <p>{{ userInformation()?.subscribers | shortNumber }} подписчиков</p>
            </div>
<!--            <div class="subscribe-button">-->
<!--                <button-->
<!--                    [ngClass]="{'dissubscribe': isSubscribed(), 'subscribe': !isSubscribed()}"-->
<!--                    (click)="changeSubscribeStatus()">-->
<!--                    {{ isSubscribed() ? 'Отписаться' : 'Подписаться' }}-->
<!--                </button>-->
<!--            </div>-->
        </div>
    </div>
    <div class="videos">
        @if (userVideos() !== null) {
            <app-videos-grid [videosInput]="userVideos()"></app-videos-grid>
        }
    </div>
</div>
