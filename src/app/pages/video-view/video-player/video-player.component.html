<div class="player-container">
    <video 
        #videoPlayer 
        (click)="this.playPauseVideo()"
    >
        <source [src]="video()" type="video/mp4">
    </video>
    
    <div class="controls">
        <div class="left">
            <button class="play-button" (click)="playPauseVideo()">
                <img [src]="isPlaying() ? './icons/stop-icon.svg' : './icons/play-icon.svg'">
            </button>
            <div class="time-container">
                <p>
                    {{ currentTime() | timeConverter }} / {{ duration() | timeConverter}}
                </p>
            </div>
            <div class="volume">
                <button (click)="changeMuteStatus()">
                    @if (currentVolume() > 0.8) {
                        <img
                            src="./icons/volume/volume-max-icon.svg"
                        >
                    } @else if (currentVolume() > 0.4) {
                        <img
                            src="./icons/volume/volume-mid-icon.svg"
                        >
                    } @else if (currentVolume() > 0) {
                        <img
                            src="./icons/volume/volume-min-icon.svg"
                        >
                    } @else {
                        <img
                            src="./icons/volume/volume-zero-icon.svg"
                        >
                    }
                </button>
                <input type="range" class="volume-bar" 
                    #volumeBar min="0" max="1" step="0.01" 
                    [value]="currentVolume()"
                    (input)="setVolume($event)">
            </div>
        </div>
        <div class="right">
            <button title="Картинка в картинке" (click)="togglePip()">
                <img src="./icons/picture-in-picture-icon.svg">
            </button>
        </div>
        <input class="progress" type="range" 
            #progressBar min="0" max="100" step="0.01" 
            value="0" (input)="seekVideo($event)">
    </div>
</div>
