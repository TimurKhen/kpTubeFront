<div class="container">
    <form [formGroup]="videoForm">
        <div class="video-zone">
            @if (videoURL()) {            
                <div class="video">
                    @defer {
                        <video-player [video]="videoURL()" [alwaysShowUI]="true"></video-player>
                    } @placeholder {
                        <div class="placeholder">Видео загружается...</div>
                    }
                </div>
                <button class="delete-button" 
                    (click)="clearVideo()">Удалить видео</button>
            } @else {
                <label class="video" for="video-input">
                    <div class="message">
                        <button>Загрузить видео</button>
                    </div>
                    <input 
                        #videoInput
                        id="video-input"
                        type="file" accept="video/mp4, .mp4" 
                        (input)="onVideoChange($event)">
                </label>
            }
        </div>
        <div class="second-zone">
            <div class="preview-zone">
                @if (previewURL()) {
                    <div class="preview-container">
                        <div class="preview">
                            <img [src]="previewURL()">
                        </div>
                        <button class="delete-button" 
                            (click)="clearPreview()">Удалить превью</button>
                    </div>
                } @else {
                    <label class="preview" for="preview-input">
                        <div class="message">
                            <button>Загрузить превью</button>
                        </div>
                        <input 
                            #previewInput
                            id="preview-input" 
                            type="file" 
                            (input)="onPreviewChange($event)" accept=".jpg">
                    </label>
                }

                <div class="visibility">
                    <h4>Доступность видео</h4>
                    <button class="select public" 
                        [ngClass]="{'active': videoForm.get('visibility')?.value == 0}"
                        (click)="changeCurrentVisibility(0)"
                    >    
                        <img src="icons/wide-icon.svg">
                        <p>Доступно всем</p>
                    </button>
                    <button class="select link" 
                        [ngClass]="{'active': videoForm.get('visibility')?.value == 1}"
                        (click)="changeCurrentVisibility(1)"
                    >
                        <img src="icons/link-icon.svg">
                        <p>Доступ по ссылке</p>
                    </button>
                </div>
            </div>
            <div class="inputs">
                <label>
                    <p>Название:</p>
                    <input maxlength="70" formControlName="name">
                    <p 
                        class="text-count"
                        [ngClass]="{'active': videoForm.get('name')?.value?.length}"
                        >
                        {{ videoForm.get('name')?.value?.length }} / 70
                    </p> 
                </label>
                <label>
                    <p>Описание:</p>
                    <textarea maxlength="2500" cols="40" formControlName="description"></textarea>
                    <p 
                        class="text-count"
                        [ngClass]="{'active': videoForm.get('description')?.value?.length}"
                        >
                        {{ videoForm.get('description')?.value?.length }} / 2500
                    </p>  
                </label>
            </div>
        </div>
    </form>
    <button 
        class="publish-button"
        [disabled]="!videoForm.valid || isLoading()"
        (click)="publish()"
        >
        Опубликовать
    </button>
</div>
