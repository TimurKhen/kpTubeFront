<nav>
  <div class="search">
    <div class="searchInput">
      @if (!isMobile) {
        <label for="inputToSearch" class="form">
          <button (click)="onSearch()">Search</button>
          <input [(ngModel)]="userInput" (keyup.enter)="onSearch()" id="inputToSearch" maxlength="30"
            placeholder="Введите запрос" autocomplete="off"
            />
          </label>
        }
      </div>
      <div class="account">
        @if (isMobile) {
          <button (click)="searchIconClick()" class="system_search_icon">
            <img id="search_button_icon" class="systemIcons" src="Search.svg">
          </button>
        }
        @if (!isInputDisabled && isMobile) {
          <span class="search_mobile">
            <input class="search_mobile_input"
              [(ngModel)]="userInput" (keyup.enter)="onSearch()" id="inputToMobileSearch" maxlength="25"
              placeholder="Введите запрос" autocomplete="off"
              >
            </span>
          }
          @if (isInputDisabled || !isMobile) {
            <span class="account_data">
              <button appSystemIconsStyles><a routerLink="/creating"><img class="systemIcons" src="newVideo.svg"></a></button>
              @if (isUserHaveAccount && isServerOnline) {
                <button (mouseenter)="setHoverStatus(true)"
                  (mouseleave)="setHoverStatus(false)"
                  appSystemIconsStyles class="userAvatarButton"><a href="/account/{{userID}}"><img
                [src]="userAvatar"></a></button>
              } @else {
                <button appSystemIconsStyles class="userAvatarWithoutAccount systemIcons"><a href="/account/"><img
                src="UserIcon.svg"></a></button>
              }
            </span>
          }
        </div>
      </div>
    </nav>
